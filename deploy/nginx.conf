server {
    listen 80;
    server_name faceid.akhu.uz verification.akhu.uz;

    # Maximum file upload size for passport image Excel sheets and audits
    client_max_body_size 25M;

    # Static files serving directly via Nginx
    location /static/ {
        alias /var/www/akhu_verification/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files serving directly via Nginx
    location /media/ {
        alias /var/www/akhu_verification/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy to Gunicorn via Unix Socket
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
    }
}
