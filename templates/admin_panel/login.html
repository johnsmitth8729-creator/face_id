{% extends "base/base.html" %}
{% load i18n static %}

{% block body_class %}admin-portal{% endblock %}

{% block content %}
<div class="login-layout">
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon large admin-icon">
        <i class="bi bi-gear-wide-connected"></i>
      </div>
      <h1 class="login-title">{% trans "Admin Panel" %}</h1>
      <p class="login-subtitle">{{ SITE_NAME }}</p>
      <div class="access-warning admin-warning">
        <i class="bi bi-shield-fill"></i>
        {% trans "Administrator Access Only" %}
      </div>
    </div>
    <div class="login-card">
      <form method="post" id="adminLoginForm">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label">{% trans "Username" %}</label>
          <div class="input-with-icon">
            <i class="bi bi-person-fill"></i>
            <input type="text" name="username" class="form-control" id="adminUsername"
              placeholder="{% trans 'Admin username' %}" required autocomplete="off">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">{% trans "Password" %}</label>
          <div class="input-with-icon">
            <i class="bi bi-lock-fill"></i>
            <input type="password" name="password" class="form-control" id="adminPassword"
              placeholder="{% trans 'Admin password' %}" required>
            <button type="button" class="toggle-password" onclick="togglePassword('adminPassword', this)">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-akhu-primary w-100 justify-content-center" id="adminLoginBtn">
          <i class="bi bi-shield-check me-2"></i>{% trans "Sign In as Administrator" %}
        </button>
      </form>
    </div>
    <div class="login-back-link mt-4">
      <a href="{% url 'verification:home' %}">
        <i class="bi bi-arrow-left me-1"></i>{% trans "Return to Main Page" %}
      </a>
    </div>
  </div>
</div>

<style>
.login-layout { min-height:calc(100vh - 70px);display:flex;align-items:center;justify-content:center;padding:40px 20px; }
.login-container { width:100%;max-width:440px; }
.login-brand { text-align:center;margin-bottom:32px; }
.brand-icon.large { width:70px;height:70px;font-size:1.8rem;margin:0 auto 16px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:white; }
.admin-icon { background:linear-gradient(135deg,#7C3AED,#4F46E5);box-shadow:0 0 30px rgba(124,58,237,0.3); }
.login-title { font-size:1.6rem;font-weight:800;margin-bottom:4px; }
.login-subtitle { color:var(--text-secondary);font-size:0.9rem;margin-bottom:12px; }
.access-warning { display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-full);font-size:0.78rem;font-weight:600; }
.admin-warning { background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);color:#A78BFA; }
.login-card { background:var(--gradient-card);border:1px solid var(--border-color);border-radius:var(--radius-xl);padding:32px; }
.input-with-icon { position:relative; }
.input-with-icon > i:first-child { position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.95rem;pointer-events:none;z-index:2; }
.input-with-icon .form-control { padding-left:44px !important; }
.toggle-password { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:0.95rem;z-index:2; }
.login-back-link { text-align:center; }
.login-back-link a { color:var(--text-secondary);text-decoration:none;font-size:0.88rem; }
</style>
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'bi bi-eye-slash' : 'bi bi-eye';
}
</script>
{% endblock %}
